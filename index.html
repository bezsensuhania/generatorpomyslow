<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inspo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #1e1e1e;
  --border-mid: #2e2e2e;
  --text: #d8d8d0;
  --muted: #555;
  --hint: #2a2a2a;
  --accent: #c8c0a8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

header {
  margin-bottom: 40px;
}

header h1 {
  font-weight: 300;
  font-size: 11px;
  letter-spacing: .2em;
  color: var(--muted);
  text-transform: uppercase;
}

.label {
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

/* ── STEP 1 two-column layout ── */
.select-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 700px) {
  .select-grid { grid-template-columns: 1fr; gap: 32px; }
}

/* ── pills ── */
.pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  transition: border-color .15s, color .15s;
  user-select: none;
}

.pill:hover { border-color: #444; color: var(--accent); }
.pill.on { border-color: var(--accent); color: var(--accent); }
.pill .desc { font-size: 10px; color: var(--hint); font-style: italic; }
.pill.on .desc { color: #3a3a3a; }
.pill .x { font-size: 14px; color: #3a3a3a; line-height: 1; }

.add-row { display: flex; gap: 8px; margin-top: 4px; }

.add-row input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 12px;
  outline: none;
  transition: border-color .15s;
}

.add-row input::placeholder { color: #2e2e2e; }
.add-row input:focus { border-color: #444; }

/* ── mode toggle ── */
.mode-toggle {
  display: inline-flex;
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 24px;
}

.mode-btn {
  padding: 5px 18px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: .08em;
  transition: background .15s, color .15s;
  user-select: none;
}

.mode-btn:first-child { border-right: 1px solid var(--border-mid); }
.mode-btn.on { background: var(--surface); color: var(--accent); }
.mode-btn:hover:not(.on) { color: var(--text); }

/* ── sliders ── */
.slider-block { margin-bottom: 20px; }
.slider-label-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.slider-end { font-size: 10px; color: var(--muted); }

input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 1px;
  background: var(--border-mid);
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  transition: background .15s;
}

input[type=range]:hover::-webkit-slider-thumb { background: #fff; }

/* ── buttons ── */
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border-mid);
  border-radius: 2px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  white-space: nowrap;
}

.btn-ghost:hover { border-color: #444; color: var(--accent); }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--accent);
  border-radius: 2px;
  color: var(--accent);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .1em;
  cursor: pointer;
  transition: background .15s, color .15s;
  margin-top: 8px;
}

.btn-primary:hover { background: var(--accent); color: var(--bg); }

/* ── STEP 2 two-column layout ── */
#step-results { display: none; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 32px;
}

.result-header .vibes { font-size: 10px; color: var(--muted); letter-spacing: .06em; }

.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 700px) {
  .results-grid { grid-template-columns: 1fr; gap: 32px; }
}

/* posts */
.post {
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 18px;
  margin-bottom: 8px;
}

.post-sub { font-size: 10px; color: var(--muted); letter-spacing: .1em; margin-bottom: 6px; }

.post-title {
  font-family: var(--sans);
  font-weight: 300;
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 7px;
}

.post-body {
  font-size: 12px;
  color: #3e3e3a;
  line-height: 1.65;
  margin-bottom: 10px;
  font-style: italic;
}

.comment { display: flex; gap: 8px; margin-bottom: 5px; }
.comment::before { content: '↳'; color: var(--hint); flex-shrink: 0; margin-top: 1px; }
.comment-text { font-size: 11px; color: #484844; line-height: 1.5; }

/* palette */
.palette { display: flex; gap: 5px; height: 44px; margin-bottom: 6px; }

.swatch {
  flex: 1;
  border-radius: 2px;
  position: relative;
  cursor: default;
}

.swatch-hex {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: .03em;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}

.swatch:hover .swatch-hex { opacity: 1; }

.palette-roles {
  display: flex;
  gap: 5px;
  margin-bottom: 20px;
}

.palette-role {
  flex: 1;
  font-size: 9px;
  color: #2e2e2e;
  text-align: center;
  letter-spacing: .04em;
}

/* aesthetics */
.aesthetic-card {
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 14px 16px;
  margin-bottom: 8px;
}

.aesthetic-name { font-size: 12px; color: var(--accent); margin-bottom: 5px; letter-spacing: .04em; }
.aesthetic-desc { font-size: 11px; color: #3e3e3a; line-height: 1.55; font-style: italic; }

/* keywords */
.keywords { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.kw {
  font-size: 10px;
  color: #3a3a38;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 3px 9px;
  letter-spacing: .06em;
}

.actions { display: flex; gap: 8px; margin-top: 32px; }
.actions .btn-ghost { flex: 1; text-align: center; }
.actions .btn-primary { margin-top: 0; flex: 2; }

.section-title {
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>inspo — reddit moodboard generator</h1>
  </header>

  <!-- STEP 1 -->
  <div id="step-select">
    <div class="select-grid">

      <div>
        <div class="label">subreddits</div>
        <div class="pills" id="pills-wrap"></div>
        <div class="add-row">
          <input type="text" id="custom-input" placeholder="add your own, e.g. analog" />
          <button class="btn-ghost" onclick="addCustom()">+ add</button>
        </div>
      </div>

      <div>
        <div class="label">color mode</div>
        <div class="mode-toggle">
          <div class="mode-btn on" id="btn-rgb" onclick="setMode('rgb')">RGB</div>
          <div class="mode-btn" id="btn-cmyk" onclick="setMode('cmyk')">CMYK</div>
        </div>

        <div class="label">vibe</div>

        <div class="slider-block">
          <div class="slider-label-row">
            <span class="slider-end">dark</span>
            <span class="slider-end">optimistic</span>
          </div>
          <input type="range" min="0" max="10" value="3" step="1" id="s-mood">
        </div>

        <div class="slider-block">
          <div class="slider-label-row">
            <span class="slider-end">chaos</span>
            <span class="slider-end">minimalism</span>
          </div>
          <input type="range" min="0" max="10" value="5" step="1" id="s-comp">
        </div>

        <div class="slider-block">
          <div class="slider-label-row">
            <span class="slider-end">traditional</span>
            <span class="slider-end">contemporary</span>
          </div>
          <input type="range" min="0" max="10" value="3" step="1" id="s-time">
        </div>

        <button class="btn-primary" onclick="generate()">generate inspiration</button>
      </div>

    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step-results">

    <div class="result-header">
      <div class="label" style="margin:0">results</div>
      <div class="vibes" id="vibe-readout"></div>
    </div>

    <div class="results-grid">

      <div>
        <div class="section-title">posts</div>
        <div id="posts-out"></div>
      </div>

      <div>
        <div class="section-title">palette</div>
        <div class="palette" id="palette-out"></div>
        <div class="palette-roles" id="palette-roles"></div>

        <div class="section-title">visual style</div>
        <div id="aesthetics-out"></div>

        <div class="section-title">keywords</div>
        <div class="keywords" id="keywords-out"></div>

        <div class="actions">
          <button class="btn-ghost" onclick="back()">← back</button>
          <button class="btn-primary" onclick="generate()">shuffle again</button>
        </div>
      </div>

    </div>
  </div>

</div>

<script type="module">
import { MOCK_REDDIT, generatePalette, getAesthetics, getPosts } from './mockReddit.js';

let selected = new Set(['r/analog', 'r/Ceramics', 'r/collage', 'r/liminalspaces']);
let colorMode = 'rgb';
let customSubs = [];

function renderPills() {
  const wrap = document.getElementById('pills-wrap');
  wrap.innerHTML = '';
  Object.entries(MOCK_REDDIT).forEach(([name, data]) => {
    wrap.appendChild(makePill(name, data.desc, false));
  });
  customSubs.forEach(name => wrap.appendChild(makePill(name, 'custom', true)));
}

function makePill(name, desc, isCustom) {
  const p = document.createElement('span');
  p.className = 'pill' + (selected.has(name) ? ' on' : '');
  p.dataset.name = name;

  const nameSpan = document.createElement('span');
  nameSpan.textContent = name;
  const descSpan = document.createElement('span');
  descSpan.className = 'desc';
  descSpan.textContent = ' ' + desc;
  p.appendChild(nameSpan);
  p.appendChild(descSpan);

  if (isCustom) {
    const x = document.createElement('span');
    x.className = 'x';
    x.textContent = '×';
    x.onclick = (e) => { e.stopPropagation(); removeCustom(name); };
    p.appendChild(x);
  }

  p.onclick = () => {
    if (selected.has(name)) selected.delete(name);
    else selected.add(name);
    p.classList.toggle('on');
  };
  return p;
}

window.addCustom = function() {
  const inp = document.getElementById('custom-input');
  let val = inp.value.trim();
  if (!val) return;
  if (!val.startsWith('r/')) val = 'r/' + val;
  if (customSubs.includes(val)) { inp.value = ''; return; }
  customSubs.push(val);
  selected.add(val);
  if (!MOCK_REDDIT[val]) {
    MOCK_REDDIT[val] = {
      desc: 'custom',
      tags: [],
      posts: [{
        title: 'Post from ' + val,
        body: 'Connect to the real Reddit API to pull actual posts from this subreddit.',
        comments: ['Real content would appear here.', 'One API call away.']
      }]
    };
  }
  inp.value = '';
  renderPills();
};

function removeCustom(name) {
  customSubs = customSubs.filter(s => s !== name);
  selected.delete(name);
  delete MOCK_REDDIT[name];
  renderPills();
}

window.setMode = function(m) {
  colorMode = m;
  document.getElementById('btn-rgb').classList.toggle('on', m === 'rgb');
  document.getElementById('btn-cmyk').classList.toggle('on', m === 'cmyk');
};

window.generate = function() {
  const mood = parseInt(document.getElementById('s-mood').value);
  const comp = parseInt(document.getElementById('s-comp').value);
  const time = parseInt(document.getElementById('s-time').value);
  const pool = [...selected];
  if (!pool.length) { alert('Select at least one subreddit.'); return; }

  // posts
  const posts = getPosts(pool, mood, comp, time, 3);
  document.getElementById('posts-out').innerHTML = posts.map(p => `
    <div class="post">
      <div class="post-sub">${p.sub}</div>
      <div class="post-title">${p.title}</div>
      ${p.body ? `<div class="post-body">${p.body}</div>` : ''}
      ${p.comments.map(c => `<div class="comment"><span class="comment-text">${c}</span></div>`).join('')}
    </div>`).join('');

  // palette
  const palette = generatePalette(mood, comp, time, colorMode);
  const roles = ['light', 'mid-light', 'accent', 'mid-dark', 'dark'];
  document.getElementById('palette-out').innerHTML = palette.map(hex => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const lum = r*0.299 + g*0.587 + b*0.114;
    const tc = lum > 140 ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.55)';
    return `<div class="swatch" style="background:${hex}">
      <span class="swatch-hex" style="color:${tc}">${hex}</span>
    </div>`;
  }).join('');

  document.getElementById('palette-roles').innerHTML = roles.map(r =>
    `<div class="palette-role">${r}</div>`).join('');

  // aesthetics
  const aesthetics = getAesthetics(mood, comp, time, 2);
  document.getElementById('aesthetics-out').innerHTML = aesthetics.map(a =>
    `<div class="aesthetic-card">
      <div class="aesthetic-name">${a.name}</div>
      <div class="aesthetic-desc">${a.desc}</div>
    </div>`).join('');

  // keywords
  const moodWord = mood < 4 ? 'dark' : mood > 7 ? 'optimistic' : 'ambiguous';
  const compWord = comp < 4 ? 'chaotic' : comp > 7 ? 'minimal' : 'balanced';
  const timeWord = time < 4 ? 'traditional' : time > 7 ? 'contemporary' : 'timeless';
  const aeKw = aesthetics.flatMap(a => a.name.toLowerCase().split(/\s+/));
  const allKw = [...new Set([moodWord, compWord, timeWord, colorMode === 'cmyk' ? 'print' : 'screen', ...aeKw])];
  document.getElementById('keywords-out').innerHTML = allKw.map(k =>
    `<span class="kw">${k}</span>`).join('');

  document.getElementById('vibe-readout').textContent =
    `mood ${mood}/10 · comp ${comp}/10 · time ${time}/10 · ${colorMode.toUpperCase()}`;

  document.getElementById('step-select').style.display = 'none';
  document.getElementById('step-results').style.display = 'block';
};

window.back = function() {
  document.getElementById('step-select').style.display = 'block';
  document.getElementById('step-results').style.display = 'none';
};

renderPills();
</script>
</body>
</html>
